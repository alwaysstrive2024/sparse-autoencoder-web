# 【已弃用】当前部署已经迁移到 charts/sae-web。不要再 kubectl apply 本文件，
# 否则它会与 Helm Release 使用不同的 Secret、存储和 Clash 配置，造成配置漂移。
# 后端 Deployment：FastAPI 与自有 Clash sidecar 共享同一个 Pod 网络。
# 后端通过 127.0.0.1:7890 访问 sidecar；代理订阅配置由 Secret 挂载，不入仓库。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sae-backend
  namespace: gufy
  labels:
    app: sae-backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  # GPU Pod 和临时模型缓存都很大，Recreate 避免滚动升级时同时占用两份资源。
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sae-backend
  template:
    metadata:
      labels:
        app: sae-backend
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      nodeSelector:
        gpu-model: PRO6000
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: harbor.aixiongan.org.cn:9443/saeweb/sae-backend:v1.1.0-sae6
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_PATH
              value: /root/.cache/huggingface
            # 当前集群平台已把后端容器的 /root 注入为个人持久卷。不要再为
            # /root/.cache/huggingface 挂载 emptyDir，否则会遮蔽持久化目录。
            # Hugging Face、Requests 等常用库会自动读取大小写两套代理变量。
            # localhost 和集群内 Service 必须绕过代理，避免形成代理回环。
            - name: HTTP_PROXY
              value: http://127.0.0.1:7890
            - name: HTTPS_PROXY
              value: http://127.0.0.1:7890
            - name: http_proxy
              value: http://127.0.0.1:7890
            - name: https_proxy
              value: http://127.0.0.1:7890
            - name: NO_PROXY
              value: localhost,127.0.0.1,::1,.svc,.cluster.local,kubernetes.default.svc,sae-backend-svc
            - name: no_proxy
              value: localhost,127.0.0.1,::1,.svc,.cluster.local,kubernetes.default.svc,sae-backend-svc
            # Secret 不存在时 Pod 仍能启动；访问 gated 模型前必须创建该 Secret。
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: HF_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              # 给 Clash、kubelet 和节点系统进程留出调度余量；若请求整机全部
              # 64 CPU/256Gi，再叠加 sidecar 后通常会因 Allocatable 不足而 Pending。
              cpu: "60"
              memory: 240Gi
              nvidia.com/gpu: "2"
            limits:
              cpu: "64"
              memory: 256Gi
              nvidia.com/gpu: "2"
          # 启动探针确认 Python/ML 依赖已导入；运行期使用 TCP 探针，避免长时间
          # 同步模型推理阻塞事件循环时被 HTTP liveness 误判并重启。
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            failureThreshold: 3

        - name: clash
          # 自有静态 Clash 二进制镜像携带 Country.mmdb。
          image: harbor.aixiongan.org.cn:9443/saeweb/clash:verified-amd64-v1
          imagePullPolicy: IfNotPresent
          args:
            - -d
            - /root/.config/clash
            - -f
            - /etc/clash/config.yaml
          ports:
            - name: proxy
              containerPort: 7890
            - name: controller
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: clash-config
              mountPath: /etc/clash
              readOnly: true
            - name: clash-data
              mountPath: /root/.config/clash
          startupProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 2
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: clash-config
          secret:
            secretName: clash-config
            items:
              - key: config.yaml
                path: config.yaml
        # provider 下载文件和 Clash 运行状态需要可写目录，不能写入只读 Secret。
        - name: clash-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sae-backend-svc
  namespace: gufy
spec:
  selector:
    app: sae-backend
  ports:
    - name: http
      port: 8000
      targetPort: http

---
# 前端不需要 GPU，也不与 Clash sidecar 同 Pod；它通过集群 DNS 访问后端 Service。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sae-frontend
  namespace: gufy
  labels:
    app: sae-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: sae-frontend
  template:
    metadata:
      labels:
        app: sae-frontend
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: frontend
          image: harbor.aixiongan.org.cn:9443/saeweb/sae-frontend:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: sae-frontend-svc
  namespace: gufy
spec:
  selector:
    app: sae-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
