# 这是 Clash 配置模板，不要把真实订阅地址、节点或密钥提交到 Git。
# 填写后通过 Helm --set-file 写入 Clash ConfigMap；不要把真实配置提交到 Git。
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

profile:
  store-selected: true

proxy-providers:
  company-provider:
    type: http
    url: "REPLACE_WITH_YOUR_CLASH_SUBSCRIPTION_URL"
    path: ./providers/company-provider.yaml
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: OUTBOUND
    type: select
    use:
      - company-provider

rules:
  # 集群内地址由后端的 NO_PROXY 绕过；所有其他 HTTP(S) 请求经代理出网。
  # 不使用 GEOIP 规则，避免 sidecar 首次启动时还需要额外下载 geodata。
  - MATCH,OUTBOUND
