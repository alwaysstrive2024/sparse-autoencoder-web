server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Backend API Reverse Proxy ───────────────────────────────────────────
    # Any request starting with /api/ is stripped of the /api prefix
    # and forwarded to the backend K8s service (internal DNS, same namespace).
    # The browser never needs to know the backend's address.
    location /api/ {
        proxy_pass         http://sae-backend-svc/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Long timeout for model inference (SAE feature extraction can take a while)
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;
    }

    # ─── React SPA Fallback ──────────────────────────────────────────────────
    # For all other routes, serve index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Optional: Cache static assets ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
