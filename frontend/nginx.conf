server {
    # 容器内监听 80，由 Docker -p 或 Kubernetes Service 暴露到宿主机。
    listen 80;
    server_name _;

    # 最终镜像只有 Vite 输出的 dist 文件，不需要 Node 开发服务器。
    root /usr/share/nginx/html;
    index index.html;

    # 前端生产构建只访问同源 /api。结尾带 / 的 proxy_pass 会剥掉 /api/：
    # 浏览器的 /api/models 会转发成后端的 /models，且浏览器无需知道后端 IP。
    location /api/ {
        proxy_pass http://sae-backend-svc:8000/;
        proxy_http_version 1.1;

        # 保留原始请求信息，便于 FastAPI 日志、审计及未来生成绝对 URL。
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 首次加载大模型可能耗时较长，避免 Nginx 提前返回 504。
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Vite 会给构建资源名加内容哈希，可安全缓存一年，减少重复传输流量。
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA 的关键配置：真实静态文件不存在时返回 index.html，交给前端
    # 路由接管。用户直接访问或刷新 /models/xxx 等子路由时便不会得到 404。
    location / {
        try_files $uri $uri/ /index.html;

        # index.html 引用了带哈希的新资源，不应长期缓存，否则发布后可能仍
        # 指向旧资源。no-cache 会让浏览器复验，但仍可节省未变化内容的传输。
        add_header Cache-Control "no-cache";
    }
}
